name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel old runs of the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # Bootstrap: go.sum is not yet committed (user has no local Go install).
      # Once go.sum lands in the repo, switch this to `go mod download` +
      # `go mod verify` for strict mode and re-enable setup-go caching.
      - name: go mod tidy
        run: go mod tidy

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build (host)
        run: go build ./...

      # Drone companion target — verify pure-Go cross-compile works.
      - name: Build (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...
